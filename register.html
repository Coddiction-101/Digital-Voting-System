<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Digital Voting System</title>
    <link rel="stylesheet" href="css/register.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
    <div class="container">
        <div class="login-box">
            <div class="login-header">
                <i class="fas fa-user-plus"></i>
                <h1>Register - Digital Voting System</h1>
                <p>Create your account to vote</p>
            </div>
            <form action="php/register.php" id="registerForm" method="post">
                <h2>Create an Account</h2>

                 <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" name="name" id="name" placeholder="Full Name" required>
                </div>

                 <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="text" name="email" id="email" placeholder="Email or Voter ID" required>
                </div>

                 <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>

                 <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="confirmPassword" name="confirm_password" placeholder="Confirm Password"
                        required>
                    <i class="fas fa-eye toggle-password" id="toggleConfirmPassword"></i>
                </div>

                 <div class="error-message" id="errorMessage" style="display: none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText"></span>
                </div>

                <!-- Register Button -->
                <button type="submit" name="register" class="login-btn">
                    <i class="fas fa-user-plus"></i>
                    Register
                </button>

                <div class="register-link">
                    Already have an account? <a href="login.html">Login here</a>
                </div>
            </form>
        </div>
    </div>
    <script src="js/register.js"></script>
</body>

</html>
