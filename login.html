<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Digital Voting System</title>
    <link rel="stylesheet" href="css/login.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
    <div class="container">
        <div class="login-box">
            <div class="login-header">
                <i class="fas fa-vote-yea"></i>
                <h1>Digital Voting System</h1>
                <p>Secure ~ Transparent ~ Democratic</p>
            </div>
            <form action="php/login.php" id="loginForm" method="post">
                <h2>Login to Vote</h2>
                <!-- Email/Voter ID Input -->
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" name="email" id="email" placeholder="Email or Voter ID" required />
                </div>
                <!-- Password Input -->
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Password" required />
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>
                <!-- Remember me -->
                <div class="options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember" name="remember" />
                        <span>Remember me</span>
                    </label>
                    <a href="forgot_password.html" class="forgot-password">Forgot password</a>
                </div>
                <!-- Error msg -->
                <div class="error-message" id="errorMessage" style="display: none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText"></span>
                </div>
                <!-- Login Button -->
                <button type="submit" name="login" class="login-btn"> <i class="fas fa-sign-in-alt"></i>
                    Login
                </button>
                <div class="register-link">
                    <a href="register.html">Register now</a>
                </div>
            </form>
            <!-- Logout link placed outside the form for clarity -->
            <div class="logout-section" style="margin-top: 20px; text-align: center;">
                <a href="php/logout.php" class="logout-link">Logout</a>
            </div>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>

</html>
