<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Digital Voting System</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>
    <div class="container">
        <div class="input-box">
            <div class="input-header">
                <i class="fas fa-vote-yea"></i>
                <h1>Digital Voting System</h1>
                <p>Secure ~ Transparent ~ Democratic</p>
            </div>
            <form action="php/login.php" id="loginForm" method="post">

                <h2>Login to Vote</h2>
                <!-- Email/Voter ID Input -->
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" name="email" id="email" placeholder="Email or Voter ID" required>
                </div>
                <!-- Password Input -->
                <div class="login-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <i class="fas fa-eye toggle-password" id="togglePassowrd"></i>
                </div>
                <!-- Remember me -->
                <div class="options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="forgot_password.html" class="forgot-password">Forgot password</a>
                </div>
                <!-- Error msg -->
                <div class="error-message" id="errorMessage" style="display: none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText"></span>
                </div>

                <!-- Login Button -->
                 <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    Login
                 </button>

                 <div class="register-link">
                    <a href="register.html">Register now</a>
                 </div>

            </form>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>

</html>
